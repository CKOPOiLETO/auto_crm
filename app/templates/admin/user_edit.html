{% extends "base.html" %}

{% block title %}Редактирование сотрудника{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-6">
        <h2 class="mb-4">✏️ Редактирование сотрудника</h2>
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Логин для входа</label>
                        <input type="text" name="login" class="form-control" value="{{ user.login }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">ФИО сотрудника</label>
                        <input type="text" name="full_name" class="form-control" value="{{ user.full_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Роль в системе</label>
                        <select name="role" class="form-select">
                            <option value="manager" {% if user.role == 'manager' %}selected{% endif %}>Менеджер</option>
                            <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Администратор</option>
                        </select>
                    </div>
                    <hr class="my-4">
                    <div class="mb-3">
                        <label class="form-label text-danger fw-bold">Новый пароль</label>
                        <input type="password" name="password" class="form-control" placeholder="Оставьте пустым, если не хотите менять">
                        <div class="form-text">Заполняйте только в случае, если сотрудник забыл пароль.</div>
                    </div>
                    
                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary btn-lg">💾 Сохранить изменения</button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
